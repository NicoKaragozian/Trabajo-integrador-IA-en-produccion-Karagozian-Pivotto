model:
  target: "prod_pet"
  features:
    - avg_prod_pet_10m
    - avg_prod_gas_10m
    - last_prod_pet
    - n_readings
    - profundidad
    - tipo_extraccion
  xgb_params:
    n_estimators: 200
    max_depth: 5
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 5
    random_state: 42        # seed fija → reproducibilidad garantizada
    n_jobs: -1

inference:
  decline_rate_monthly: 0.02  # 2% decline mensual en el pronóstico
